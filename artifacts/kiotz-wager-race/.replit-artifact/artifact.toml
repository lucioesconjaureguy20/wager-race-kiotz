kind = "web"
previewPath = "/"
title = "Kiotz Wager Race"
version = "1.0.0"
id = "artifacts/kiotz-wager-race"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25071

[services.development]
run = "pnpm --filter @workspace/kiotz-wager-race run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kiotz-wager-race", "run", "build" ]
publicDir = "artifacts/kiotz-wager-race/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25071"
BASE_PATH = "/"
